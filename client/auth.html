<!--Write a basic auth frontend, 2 input fields for username and password, with a hr between them-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Login</h1>
    <form id="login-form">
        <input type="text" id="login_username" placeholder="Username" required><br><hr>
        <input type="password" id="login_password" placeholder="Password" required><br><hr>
        <button type="submit">Login</button>
    </form>
    <hr>
    <h1>Register</h1>
    <form id="register-form">
        <input type="text" id="register_username" placeholder="Username" required><br><hr>
        <input type="password" id="register_password" placeholder="Password" required><br><hr>
        <button type="submit">Register</button>
    </form>
    <p id="auth-message"></p>
</body>
</html>
