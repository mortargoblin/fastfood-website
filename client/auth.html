<!--Write a basic auth frontend, 2 input fields for username and password, with a hr between them-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="grid grid-cols">
    <div class="px-8 py-8 text-center col-start-1 col-end-3">
    <h1 class="text-2xl font-bold">Login</h1>
    <form class="text-center px-8 py-4" id="login-form">
        <input class="text-center" type="text" id="login_username" placeholder="Username" required><br><hr>
        <input class="text-center" type="password" id="login_password" placeholder="Password" required><br><hr>
        <button class="cursor-pointer p-4" type="submit">Login</button>
    </form>
    </div>
    <div class="px-8 py-8 text-center col-span-1">
        <h1 class="text-2xl font-bold">Create account</h1>
        <form class="text-center px-8 py-4" id="register-form">
            <input class="text-center" type="text" id="register_username" placeholder="Username" required><br><hr>
            <input class="text-center" type="password" id="register_password" placeholder="Password" required><br><hr>
            <button class="cursor-pointer p-4" type="submit">Register</button>
        </form>
    </div>
    <br>
    <img class="max-w-80 m-auto col-span-2 col-end-7" src="img/NNiso.png" alt="burger">
    <br>
    <p id="auth-message"></p>
</div>
</body>
</html>
