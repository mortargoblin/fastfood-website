<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
</head>
<body>
    <h1>Admin products</h1>
    <form id="create-product-form">
        <input type="text" id="product_name" placeholder="Product name" required><br><hr>

    <p id="admin-message"></p>
    <hr>
    <h2>Products</h2>
    <ul id="product-list"></ul>
</body>
</html>
